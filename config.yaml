# 追踪方向（每个关键词在 ti/abs/co 中择一即命中；多关键词为 OR，再与 categories 按 logic 组合）:
# 1) RL for LLM：用人类/AI 反馈、偏好优化、策略梯度等对齐或训练大语言模型
# 2) LLM 自动化算法设计：用 LLM 做程序/架构/算法发现、自动 ML、演搜索等
categories: ["cs.LG", "cs.AI", "cs.CL", "cs.NE"]
keywords:
  # --- RL for LLM ---
  - "RLHF"
  - "reinforcement learning from human feedback"
  - "reinforcement learning for large language model"
  - "reinforcement learning with large language model"
  - "reinforcement learning from AI feedback"
  - "RLAIF"
  - "direct preference optimization"
  - "group relative policy optimization"
  - "GRPO"
  - "proxy reward"
  - "reward model"
  - "DPO"
  - "ORPO"
  - "KTO"
  - "PPO for language"
  # --- LLM Automated Algorithm Design (AAD) ---
  - "automated algorithm design"
  - "LLM for algorithm design"
  - "large language model for program synthesis"
  - "large language model for neural architecture"
  - "neural program synthesis"
  - "language model for neural architecture search"
  - "LLM for AutoML"
  - "LLM and AutoML"
  - "neural program search"
  - "LLM for algorithm discovery"
  - "FunSearch"
  - "AlphaCode"

# exclude_keywords: []

logic: "AND"
max_results: 50
sort_by: "lastUpdatedDate"
sort_order: "descending"

lang: "both"

summary:
  mode: llm
  scope: "both"

# Gmail：需在 Google 账户中开启「应用专用密码」，环境变量 SMTP_PASS 填该密码（非普通登录密码）
email:
  enabled: true
  subject: "[arXiv] RL4LLM & LLM 自动化算法设计"
  smtp_server: "smtp.gmail.com"
  smtp_port: 465
  smtp_pass_env: "SMTP_PASS"
  tls: "ssl"
  debug: false
  detail: "full"
  max_items: 30
  attach_md: true
  attach_pdf: false

llm:
  provider: "openai-compatible"
  base_url: "https://api.siliconflow.cn"
  model: "Qwen/Qwen2.5-7B-Instruct"
  api_key_env: "OPENAI_COMPAT_API_KEY"
  # base_url: "https://api.deepseek.com"
  # model: "deepseek-chat"
  # api_key_env: "OPENAI_COMPAT_API_KEY"

  system_prompt_en: |
    You are a senior paper-reading assistant. Based on the given metadata and abstract,
    write ONE concise paragraph in English that covers: research motivation, main method,
    and key experimental findings. Be objective and specific; avoid marketing language.
    Preserve any provided links, but do NOT repeat them in the paragraph.
  system_prompt_zh: |
    你是资深论文阅读助手。基于给定的论文元信息与摘要，用中文写「一段」简洁的总结，
    包含研究动机、核心方法与关键实验结果。保持客观、术语准确；避免营销式表述。
    如有链接请保留，但不要在总结里重复链接。

translate:
  enabled: true
  lang: "zh"
  fields: ["title", "summary"]

site:
  enabled: true
  dir: "docs"
  title: "arXiv · RL4LLM & LLM 自动化算法设计"
  keep_runs: 1024
  theme: "light"
  accent: "#2563eb"

freshness:
  since_days: 3
  unique_only: true
  state_path: ".state/seen.json"
  fallback_when_empty: false

scrape:
  html: true
  pdf_if_missing: true
  pdf_first_page: false
  timeout: 10
