# 追踪方向:
# 1) RL for LLM
# 2) LLM 自动化算法设计
categories: ["cs.LG", "cs.AI", "cs.CL", "cs.NE"]
keywords:
  - "RLHF"
  - "RL+LLM"
  - "LLM AutoML"
  - "LLM for Automated Algorithm Design"
  - "LLM for Automated Design"

# exclude_keywords: []

logic: "AND"
max_results: 20
sort_by: "lastUpdatedDate"
sort_order: "descending"

lang: "both"

summary:
  mode: llm
  scope: "both"

# Gmail：需在 Google 账户中开启「应用专用密码」，环境变量 SMTP_PASS 填该密码（非普通登录密码）
email:
  enabled: true
  subject: "[arXiv] RL4LLM & LLM 自动化算法设计"
  smtp_server: "smtp.gmail.com"
  smtp_port: 465
  smtp_pass_env: "SMTP_PASS"
  tls: "ssl"
  debug: false
  detail: "full"
  max_items: 10
  attach_md: true
  attach_pdf: false

llm:
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  api_key_env: "OPENAI_COMPAT_API_KEY"
  #  SiliconFlow 示例：
  #  base_url: "https://api.siliconflow.cn"
  #  model: "Qwen/Qwen2.5-7B-Instruct"

  system_prompt_en: |
    You are a senior paper-reading assistant. Based on the given metadata and abstract,
    write ONE concise paragraph in English that covers: research motivation, main method,
    and key experimental findings. Be objective and specific; avoid marketing language.
    Preserve any provided links, but do NOT repeat them in the paragraph.
  system_prompt_zh: |
    你是资深论文阅读助手。基于给定的论文元信息与摘要，用中文写「一段」简洁的总结，
    包含研究动机、核心方法与关键实验结果。保持客观、术语准确；避免营销式表述。
    如有链接请保留，但不要在总结里重复链接。

translate:
  enabled: true
  lang: "zh"
  fields: ["title", "summary"]

site:
  enabled: true
  dir: "docs"
  title: "arXiv · RL4LLM & LLM 自动化算法设计"
  keep_runs: 1024
  theme: "light"
  accent: "#2563eb"

freshness:
  since_days: 3
  unique_only: true
  state_path: ".state/seen.json"
  fallback_when_empty: false

scrape:
  html: true
  pdf_if_missing: true
  pdf_first_page: false
  timeout: 10
